<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개인 1차 프로젝트 personal1.html</title>
    <link rel="stylesheet" href="../css/personal1.css" />
  </head>
  <body>
    <section class="page s1">
      <div class="content-box">
        <h2>[슬라이드: AI 애니메이션 제작 워크플로우]</h2>
        <ul>
          <li>
            <strong> 기획 & 스토리 :</strong> 주제선정, 세계관 구체화, 프롬프트
            설계
          </li>
          <li>
            <strong>영상화:</strong> 생성된 정지 이미지를 동적인 영상(Flow)으로
            변환.
          </li>
          <li>
            <strong>편집 & 사운드:</strong> 컷 편집, 영상 리듬 정리, 내레이션 및
            효과음 보강.
          </li>
          <li>
            <strong>최종 완성:</strong> 디테일 보정, 전체 퀄리티 조정 및 종합
            렌더링.
          </li>
        </ul>
      </div>
    </section>

    <section class="page s2">
       <div class="roadmap-container">
         <div class="roadmap-text title-text">AI워크플로우</div>
         <div class="roadmap-text step1">기획스토리</div>
         <div class="roadmap-text step2">시각화</div>
         <div class="roadmap-text step3">영상화</div>
         <div class="roadmap-text step4">편집</div>
         <div class="roadmap-text step5">사운드</div>
         <div class="roadmap-text step6">완성</div>
       </div>  
    </section>

    
    <section class="page">3</section>
    <section class="page">4</section>
    <section class="page">5</section>
    <section class="page">6</section>
    <section class="page">7</section>
    <section class="page">8</section>
    <section class="page">9</section>
    <section class="page">10</section>
    <section class="page">11</section>
<section class="page video-page">
  <div class="video-wrapper">
    <iframe
      id="myIframe"
      src="https://www.youtube.com/embed/tXhPL_tDxH8?enablejsapi=1"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <div class="video-controls">
    <button id="playBtn">▶ play</button>
    <button id="pauseBtn">⏸ pause</button>
    <button id="replayBtn">🔄 replay</button>
  </div>
</section>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let player;

  // API 준비되면 자동 호출
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('myIframe', {
      events: {
        onReady: () => console.log('플레이어 준비 완료')
      }
    });
  }

  document.getElementById('playBtn').addEventListener('click', () => player.playVideo());
  document.getElementById('pauseBtn').addEventListener('click', () => player.pauseVideo());
  document.getElementById('replayBtn').addEventListener('click', () => {
    player.seekTo(0);
    player.playVideo();
  });
</script>

  </body>
</html>
